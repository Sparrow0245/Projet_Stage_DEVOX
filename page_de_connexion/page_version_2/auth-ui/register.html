<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>

<body>

<div class="container">
  <div class="card">
    <h1>Inscription</h1>

    <input id="username" placeholder="Nom d'utilisateur">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button onclick="register()">Créer un compte</button>

    <div class="message" id="msg"></div>

    <div class="link">
      Déjà un compte ?
      <a href="login.html">Connexion</a>
    </div>
  </div>
</div>

<script>
async function register() {
  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const msg = document.getElementById("msg");
  msg.textContent = "";

  try {
    const res = await fetch("http://localhost:8080/api/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.style.color = "red";
      msg.textContent = data.error || "Erreur inscription";
      return;
    }

    msg.style.color = "green";
    msg.textContent = data.message || "Compte créé";
  } catch (err) {
    msg.style.color = "red";
    msg.textContent = "Serveur inaccessible";
  }
}
</script>

</body>
</html>
