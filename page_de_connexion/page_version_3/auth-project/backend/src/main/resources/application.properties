# =============================================
# VERSION : SESSION COOKIE (défaut)
# Pour passer en JWT : spring.profiles.active=jwt
# =============================================

spring.application.name=auth-app

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/authdb

# Auth mode : "session" ou "jwt"
auth.mode=session

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# CORS (dev)
cors.allowed-origins=http://localhost:5173

# Logs
logging.level.com.auth=DEBUG
